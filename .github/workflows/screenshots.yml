name: iOS Screenshots

# GÃĐnÃĻre des captures d'ÃĐcran App Store depuis un simulateur iOS (aucun compte
# de test, aucune UI-test), puis les pousse sur la fiche App Store Connect via
# fastlane deliver (lane `screenshots`). Rien n'est buildÃĐ pour un device rÃĐel,
# rien n'est soumis Ã  la review.
#
# â ïļ create-ios : l'ÃĐcran initial est le LOGIN (session non authentifiÃĐe sur un
# simulateur vierge, pas de token Keychain). La capture obtenue est donc l'ÃĐcran
# de connexion. Les PNG sont TOUJOURS exposÃĐs en artefact â inspecter avant de
# considÃĐrer la fiche comme prÃŠte. Best-effort : si le build simulateur ou le
# lancement ÃĐchoue, le job ÃĐchoue proprement sans rien casser.

on:
  workflow_dispatch:

env:
  SCHEME: Create
  XCODEPROJ: Create.xcodeproj
  BUNDLE_ID: com.wizycode.create
  LOCALE_DIR: fr-FR

jobs:
  screenshots:
    runs-on: macos-15
    timeout-minutes: 60
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.2"
          bundler-cache: true

      - name: Select Xcode (le plus rÃĐcent dispo)
        run: |
          LATEST=$(ls -d /Applications/Xcode_*.app 2>/dev/null | sort -V | tail -1)
          echo "Xcode sÃĐlectionnÃĐ: $LATEST"
          sudo xcode-select -s "$LATEST"
          xcodebuild -version

      - name: GÃĐnÃĐrer le projet Xcode (XcodeGen)
        run: |
          brew install xcodegen
          xcodegen generate
          test -d "$XCODEPROJ" || { echo "::error::$XCODEPROJ non gÃĐnÃĐrÃĐ"; exit 1; }

      - name: Build pour le simulateur (signature dÃĐsactivÃĐe)
        run: |
          set -euo pipefail
          xcodebuild \
            -project "$XCODEPROJ" \
            -scheme "$SCHEME" \
            -sdk iphonesimulator \
            -configuration Debug \
            -derivedDataPath dd \
            -destination 'generic/platform=iOS Simulator' \
            CODE_SIGNING_ALLOWED=NO \
            build
          APP_PATH="dd/Build/Products/Debug-iphonesimulator/$SCHEME.app"
          test -d "$APP_PATH" || { echo "::error::$APP_PATH introuvable aprÃĻs build"; exit 1; }
          echo "APP_PATH=$APP_PATH" >> "$GITHUB_ENV"

      - name: Choisir / crÃĐer un simulateur 6.9" (Pro Max) et booter
        run: |
          set -euo pipefail
          # PrioritÃĐ Ã  un "iPhone 16 Pro Max" (rÃĐsolution 1320x2868 = 6.9" sans ambiguÃŊtÃĐ).
          pick_udid() {
            xcrun simctl list devices available | grep -F "$1" | grep -Eo '[0-9A-F]{8}-[0-9A-F]{4}-[0-9A-F]{4}-[0-9A-F]{4}-[0-9A-F]{12}' | head -1
          }
          UDID=$(pick_udid "iPhone 16 Pro Max")
          [ -z "$UDID" ] && UDID=$(pick_udid "Pro Max")
          if [ -z "$UDID" ]; then
            echo "Aucun Pro Max dispo â tentative de crÃĐation."
            RUNTIME=$(xcrun simctl list runtimes ios available | grep -Eo 'com.apple.CoreSimulator.SimRuntime.iOS-[0-9-]+' | tail -1)
            DEVTYPE=$(xcrun simctl list devicetypes | grep -Eo 'com.apple.CoreSimulator.SimDeviceType.iPhone-[0-9]+-Pro-Max' | sort -V | tail -1)
            echo "Runtime=$RUNTIME DeviceType=$DEVTYPE"
            [ -n "$RUNTIME" ] && [ -n "$DEVTYPE" ] || { echo "::error::Impossible de crÃĐer un simulateur Pro Max"; exit 1; }
            UDID=$(xcrun simctl create "shot-promax" "$DEVTYPE" "$RUNTIME")
          fi
          echo "Simulateur retenu: $UDID"
          echo "SIM_UDID=$UDID" >> "$GITHUB_ENV"
          xcrun simctl boot "$UDID" || true
          xcrun simctl bootstatus "$UDID" -b || sleep 20

      - name: Installer, lancer (forcÃĐ en franÃ§ais) et capturer
        run: |
          set -euo pipefail
          mkdir -p "fastlane/screenshots/$LOCALE_DIR"
          xcrun simctl install "$SIM_UDID" "$APP_PATH"
          # Force la langue/rÃĐgion FR pour des captures localisÃĐes.
          xcrun simctl launch "$SIM_UDID" "$BUNDLE_ID" -AppleLanguages "(fr)" -AppleLocale "fr_FR" || {
            echo "::error::Lancement de l'app ÃĐchouÃĐ"; exit 1; }
          sleep 10
          xcrun simctl io "$SIM_UDID" screenshot "fastlane/screenshots/$LOCALE_DIR/01_69.png"
          sleep 4
          xcrun simctl io "$SIM_UDID" screenshot "fastlane/screenshots/$LOCALE_DIR/02_69.png"
          sleep 4
          xcrun simctl io "$SIM_UDID" screenshot "fastlane/screenshots/$LOCALE_DIR/03_69.png"
          echo "--- Captures produites ---"
          ls -la "fastlane/screenshots/$LOCALE_DIR"
          # Dimensions (vÃĐrif 6.9") si sips dispo
          for f in fastlane/screenshots/$LOCALE_DIR/*.png; do sips -g pixelWidth -g pixelHeight "$f" || true; done

      - name: Publier les captures en artefact (toujours)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ios-screenshots
          path: fastlane/screenshots/**
          if-no-files-found: warn

      - name: Pousser les captures sur App Store Connect (fastlane deliver)
        env:
          ASC_KEY_ID: ${{ secrets.ASC_KEY_ID }}
          ASC_ISSUER_ID: ${{ secrets.ASC_ISSUER_ID }}
          ASC_KEY_P8_BASE64: ${{ secrets.ASC_KEY_P8_BASE64 }}
        run: bundle exec fastlane ios screenshots
